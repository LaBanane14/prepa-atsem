<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<title>Choisissez votre thématique — Variations</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; font-family: 'Nunito', system-ui, sans-serif; }
  body { background: #f5f5f7; color: #1a1325; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; }
  .app {
    display: grid;
    grid-template-columns: 96px 1fr;
    min-height: 100vh;
  }
  /* ======================= SHARED SIDEBAR ======================= */
  .sidebar {
    background: #ffffff;
    border-right: 1px solid #ece9f0;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 0 24px;
    gap: 18px;
    position: sticky;
    top: 0;
    height: 100vh;
  }
  .sb-logo {
    width: 48px; height: 48px;
    border-radius: 14px;
    background: linear-gradient(135deg, #8b5cf6, #a855f7);
    color: white;
    display: grid; place-items: center;
    font-weight: 900; font-size: 22px;
    box-shadow: 0 8px 20px -6px rgba(139, 92, 246, 0.55);
  }
  .sb-items { display: flex; flex-direction: column; align-items: center; gap: 6px; margin-top: 6px; flex: 1; }
  .sb-item {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    padding: 10px 8px;
    width: 68px;
    border-radius: 12px;
    color: #3a2f4a;
    font-size: 11px; font-weight: 600;
    transition: background 0.15s;
  }
  .sb-item:hover { background: #f3efff; }
  .sb-item.active { color: #eab308; }
  .sb-item svg { width: 22px; height: 22px; }
  .sb-foot { display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .sb-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: #f3efff; color: #6b21a8;
    display: grid; place-items: center;
    font-weight: 800; font-size: 14px;
  }
  .sb-logout { color: #3a2f4a; opacity: 0.6; }
  .sb-logout svg { width: 20px; height: 20px; }

  /* ======================= CONTENT ======================= */
  .content { min-width: 0; }

  /* ===== VARIATION 1 : EDITORIAL CARDS (colored) ===== */
  .v1 {
    padding: 56px 72px 80px;
    background: #faf8ff;
    min-height: 100vh;
    position: relative;
  }
  .v1::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 420px;
    background:
      radial-gradient(ellipse at 15% 0%, rgba(139,92,246,0.18), transparent 55%),
      radial-gradient(ellipse at 85% 10%, rgba(251,191,36,0.14), transparent 55%),
      radial-gradient(ellipse at 55% 0%, rgba(236,72,153,0.10), transparent 60%);
    pointer-events: none;
  }
  .v1 > * { position: relative; }
  .v1-topbar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 48px;
  }
  .v1-crumb {
    font-size: 13px; color: #6b5b8e; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
    display: flex; align-items: center; gap: 10px;
  }
  .v1-crumb::before {
    content: ''; width: 8px; height: 8px; border-radius: 50%;
    background: #8b5cf6; box-shadow: 0 0 0 4px rgba(139,92,246,0.2);
  }
  .v1-close {
    width: 40px; height: 40px; border-radius: 12px;
    background: #ffffff; border: 1px solid #ece9f0;
    display: grid; place-items: center;
    color: #3a2f4a;
  }
  .v1-close:hover { background: #f3efff; }
  .v1-hero { margin-bottom: 56px; max-width: 860px; }
  .v1-hero h1 {
    font-size: 64px; font-weight: 900; line-height: 1.02; margin: 0 0 20px;
    letter-spacing: -0.03em; color: #1a1325;
  }
  .v1-hero h1 em {
    font-style: normal;
    background: linear-gradient(135deg, #8b5cf6 0%, #ec4899 50%, #f59e0b 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent; color: transparent;
  }
  .v1-hero p {
    font-size: 18px; line-height: 1.5; color: #5e5270; margin: 0;
    max-width: 620px;
  }
  .v1-meta {
    display: flex; gap: 10px; margin-top: 28px;
    font-size: 13px; font-weight: 700;
  }
  .v1-meta span {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 14px; border-radius: 999px;
    background: white; border: 1px solid #ece9f0;
    color: #3a2f4a;
  }
  .v1-meta b { font-weight: 900; }
  .v1-meta span:nth-child(1) b { color: #8b5cf6; }
  .v1-meta span:nth-child(2) b { color: #ec4899; }
  .v1-meta span:nth-child(3) b { color: #f59e0b; }

  .v1-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
  }
  .v1-card {
    background: #ffffff;
    border-radius: 24px;
    padding: 0;
    border: 1px solid #ece9f0;
    display: flex; flex-direction: column;
    min-height: 300px;
    position: relative;
    transition: transform 0.22s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.22s;
    cursor: pointer;
    overflow: hidden;
    --card-color: #8b5cf6;
    --card-tint: rgba(139, 92, 246, 0.12);
    --card-tint-soft: rgba(139, 92, 246, 0.06);
  }
  .v1-card-inst    { --card-color: #8b5cf6; --card-tint: #ede9fe; --card-tint-soft: #f5f3ff; }
  .v1-card-hyg     { --card-color: #10b981; --card-tint: #d1fae5; --card-tint-soft: #ecfdf5; }
  .v1-card-sante   { --card-color: #f43f5e; --card-tint: #ffe4e6; --card-tint-soft: #fff1f2; }
  .v1-card-pedago  { --card-color: #f59e0b; --card-tint: #fef3c7; --card-tint-soft: #fffbeb; }
  .v1-card-relation{ --card-color: #0ea5e9; --card-tint: #e0f2fe; --card-tint-soft: #f0f9ff; }
  .v1-card-calc    { --card-color: #ec4899; --card-tint: #fce7f3; --card-tint-soft: #fdf2f8; }

  .v1-card-top {
    padding: 24px 28px 20px;
    background: var(--card-tint-soft);
    border-bottom: 1px solid #ece9f0;
    display: flex; align-items: flex-start; justify-content: space-between;
    gap: 16px;
  }
  .v1-card-body {
    padding: 20px 28px 0;
    display: flex; flex-direction: column; flex: 1;
  }
  .v1-icon {
    width: 56px; height: 56px; border-radius: 16px;
    background: var(--card-tint);
    color: var(--card-color);
    display: grid; place-items: center;
    transition: transform 0.3s, background 0.3s;
  }
  .v1-icon svg { width: 26px; height: 26px; }
  .v1-card:hover .v1-icon {
    background: var(--card-color);
    color: white;
    transform: scale(1.05) rotate(-4deg);
  }
  .v1-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 30px 50px -24px rgba(26, 19, 37, 0.22);
  }
  .v1-num {
    font-size: 11px; font-weight: 800; letter-spacing: 0.15em;
    color: var(--card-color);
    background: white;
    padding: 6px 10px;
    border-radius: 999px;
    border: 1px solid var(--card-tint);
  }
  .v1-card h3 {
    font-size: 28px; font-weight: 800; margin: 0 0 8px;
    letter-spacing: -0.02em; color: #1a1325;
  }
  .v1-card p {
    font-size: 14px; line-height: 1.5; color: #5e5270;
    margin: 0 0 auto;
  }
  .v1-cta {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 24px; padding: 16px 0 20px;
    border-top: 1px dashed #e5e0ed;
  }
  .v1-qcount {
    font-size: 12px; font-weight: 800; letter-spacing: 0.1em;
    color: var(--card-color); text-transform: uppercase;
    display: flex; align-items: center; gap: 8px;
  }
  .v1-qcount::before {
    content: ''; width: 6px; height: 6px; border-radius: 50%;
    background: var(--card-color);
  }
  .v1-arrow {
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--card-tint); color: var(--card-color);
    display: grid; place-items: center;
    transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1), background 0.25s, color 0.25s;
  }
  .v1-card:hover .v1-arrow {
    background: var(--card-color); color: white;
    transform: translateX(6px);
  }

  /* ===== VARIATION 2 : DASHBOARD ASYMMETRIQUE ===== */
  .v2 {
    padding: 40px 56px 64px;
    background: linear-gradient(180deg, #faf8ff 0%, #f5f5f7 100%);
    min-height: 100vh;
  }
  .v2-head {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 40px; gap: 32px;
  }
  .v2-head-l h1 {
    font-size: 44px; font-weight: 900; margin: 0 0 8px;
    letter-spacing: -0.025em; color: #1a1325;
  }
  .v2-head-l p { color: #5e5270; margin: 0; font-size: 15px; }
  .v2-stats {
    display: flex; gap: 16px;
  }
  .v2-stat {
    background: white; border-radius: 16px; padding: 14px 20px;
    border: 1px solid #ece9f0; min-width: 120px;
  }
  .v2-stat b { display: block; font-size: 24px; font-weight: 900; color: #1a1325; letter-spacing: -0.02em; }
  .v2-stat span { font-size: 11px; font-weight: 700; color: #8b7ea3; letter-spacing: 0.08em; text-transform: uppercase; }

  .v2-grid {
    display: grid;
    grid-template-columns: 1.4fr 1fr 1fr;
    grid-auto-rows: minmax(200px, auto);
    gap: 16px;
  }
  .v2-card {
    background: white; border-radius: 20px; padding: 24px;
    border: 1px solid #ece9f0;
    display: flex; flex-direction: column;
    cursor: pointer; position: relative; overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .v2-card:hover { transform: translateY(-3px); box-shadow: 0 20px 30px -20px rgba(26,19,37,0.15); }
  .v2-card.featured {
    grid-row: span 2;
    background: linear-gradient(160deg, #1a1325 0%, #2d1b4e 100%);
    color: white;
    padding: 32px;
  }
  .v2-card.featured::before {
    content: '';
    position: absolute; width: 280px; height: 280px;
    right: -80px; top: -80px;
    background: radial-gradient(circle, rgba(139,92,246,0.4), transparent 70%);
  }
  .v2-tag {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 10px; border-radius: 999px;
    background: #f3efff; color: #6b21a8;
    font-size: 11px; font-weight: 800; letter-spacing: 0.05em;
    width: fit-content; text-transform: uppercase;
  }
  .v2-card.featured .v2-tag { background: rgba(139,92,246,0.25); color: #d4c5ff; }
  .v2-card h3 { font-size: 26px; font-weight: 800; margin: 16px 0 6px; letter-spacing: -0.02em; }
  .v2-card.featured h3 { font-size: 38px; margin-top: 20px; }
  .v2-card p { font-size: 14px; color: #5e5270; margin: 0; line-height: 1.5; }
  .v2-card.featured p { color: #b8a9d1; font-size: 16px; }
  .v2-card .v2-foot {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: auto; padding-top: 20px;
  }
  .v2-card .v2-q {
    font-weight: 800; font-size: 13px; color: #1a1325;
  }
  .v2-card.featured .v2-q { color: white; }
  .v2-card .v2-go {
    display: flex; align-items: center; gap: 6px;
    color: #8b5cf6; font-weight: 800; font-size: 13px;
  }
  .v2-card.featured .v2-go {
    background: white; color: #1a1325; padding: 10px 18px; border-radius: 999px;
  }
  .v2-icon-square {
    width: 52px; height: 52px; border-radius: 14px;
    background: #f3efff; color: #8b5cf6;
    display: grid; place-items: center;
    position: absolute; top: 24px; right: 24px;
  }
  .v2-card.featured .v2-icon-square { background: rgba(139,92,246,0.3); color: white; width: 64px; height: 64px; border-radius: 18px; }
  .v2-icon-square svg { width: 24px; height: 24px; }
  .v2-card.featured .v2-icon-square svg { width: 32px; height: 32px; }

  /* ===== VARIATION 3 : PLAYFUL COLORED ===== */
  .v3 {
    padding: 48px 56px 64px;
    background: #fffcf5;
    min-height: 100vh;
  }
  .v3-head {
    display: flex; justify-content: space-between; align-items: flex-end;
    margin-bottom: 40px; border-bottom: 2px dashed #e6ddb8; padding-bottom: 28px;
  }
  .v3-head h1 {
    font-size: 52px; font-weight: 900; margin: 0;
    letter-spacing: -0.03em; line-height: 1;
  }
  .v3-head h1 span { display: inline-block; }
  .v3-head h1 .hl {
    background: #fde68a; padding: 0 8px; border-radius: 8px;
    transform: rotate(-1deg); display: inline-block;
  }
  .v3-head p { margin: 8px 0 0; color: #6b5b3f; font-size: 15px; font-weight: 600; }
  .v3-streak {
    display: flex; align-items: center; gap: 10px;
    background: white; padding: 10px 16px; border-radius: 14px;
    border: 2px solid #1a1325;
    box-shadow: 4px 4px 0 #1a1325;
    font-weight: 800;
  }
  .v3-streak .flame { font-size: 20px; }

  .v3-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
  }
  .v3-card {
    border-radius: 24px; padding: 24px;
    border: 2px solid #1a1325;
    box-shadow: 6px 6px 0 #1a1325;
    cursor: pointer;
    transition: transform 0.12s, box-shadow 0.12s;
    display: flex; flex-direction: column;
    min-height: 280px;
    position: relative;
  }
  .v3-card:hover {
    transform: translate(-2px, -2px);
    box-shadow: 8px 8px 0 #1a1325;
  }
  .v3-card:active {
    transform: translate(4px, 4px);
    box-shadow: 2px 2px 0 #1a1325;
  }
  .v3-c-institut { background: #c4b5fd; }
  .v3-c-hygiene  { background: #a7f3d0; }
  .v3-c-sante    { background: #fecaca; }
  .v3-c-pedago   { background: #fde68a; }
  .v3-c-relation { background: #bae6fd; }
  .v3-c-calc     { background: #fbcfe8; }
  .v3-emoji {
    width: 64px; height: 64px; border-radius: 18px;
    background: white; border: 2px solid #1a1325;
    display: grid; place-items: center;
    color: #1a1325;
  }
  .v3-emoji svg { width: 30px; height: 30px; }
  .v3-card h3 {
    font-size: 28px; font-weight: 900; margin: 20px 0 6px;
    letter-spacing: -0.02em; color: #1a1325;
  }
  .v3-card p {
    font-size: 14px; color: #1a1325; margin: 0 0 auto; opacity: 0.75;
    line-height: 1.45; font-weight: 600;
  }
  .v3-foot {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 20px;
  }
  .v3-pill {
    background: #1a1325; color: white; font-weight: 800;
    padding: 8px 14px; border-radius: 999px; font-size: 12px;
    letter-spacing: 0.05em;
  }
  .v3-go {
    width: 40px; height: 40px; border-radius: 50%;
    background: #1a1325; color: white;
    display: grid; place-items: center;
    transition: transform 0.2s;
  }
  .v3-card:hover .v3-go { transform: translateX(4px) rotate(-15deg); }

  /* ===== VARIATION 4 : MINIMAL MONOCHROME ===== */
  .v4 {
    padding: 64px 80px;
    background: #fafaf9;
    min-height: 100vh;
    color: #0a0a0a;
  }
  .v4-topbar {
    display: flex; justify-content: space-between; align-items: center;
    padding-bottom: 28px; border-bottom: 1px solid #0a0a0a;
    margin-bottom: 40px;
  }
  .v4-topbar .v4-meta {
    font-size: 12px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase;
  }
  .v4-topbar .v4-meta span { color: #737373; margin-right: 20px; }
  .v4-hero {
    display: grid; grid-template-columns: 1.2fr 1fr; gap: 48px;
    margin-bottom: 64px; align-items: end;
  }
  .v4-hero h1 {
    font-size: 92px; font-weight: 900; line-height: 0.9;
    margin: 0; letter-spacing: -0.04em;
  }
  .v4-hero h1 em {
    font-style: italic; font-weight: 400;
    font-family: 'Nunito', serif;
  }
  .v4-hero-r p {
    font-size: 15px; line-height: 1.6; margin: 0 0 16px;
    color: #404040;
  }
  .v4-list {
    border-top: 1px solid #0a0a0a;
  }
  .v4-row {
    display: grid;
    grid-template-columns: 60px 1.2fr 2fr 1fr 50px;
    gap: 24px;
    padding: 28px 0;
    border-bottom: 1px solid #d6d3d1;
    align-items: center;
    cursor: pointer;
    transition: padding 0.25s, background 0.25s;
    position: relative;
  }
  .v4-row:hover {
    padding-left: 16px;
    padding-right: 16px;
  }
  .v4-row::before {
    content: ''; position: absolute; inset: 0;
    background: #0a0a0a;
    transform: scaleX(0); transform-origin: left;
    transition: transform 0.35s cubic-bezier(0.77, 0, 0.175, 1);
    z-index: 0;
  }
  .v4-row:hover::before { transform: scaleX(1); }
  .v4-row:hover > * { color: #fafaf9 !important; position: relative; z-index: 1; }
  .v4-row:hover .v4-ic { border-color: #fafaf9; }
  .v4-row:hover .v4-arr { background: #fafaf9; color: #0a0a0a; }
  .v4-num {
    font-size: 14px; font-weight: 700;
    font-variant-numeric: tabular-nums;
    color: #737373;
  }
  .v4-ic {
    width: 44px; height: 44px; border: 1px solid #0a0a0a;
    border-radius: 50%; display: grid; place-items: center;
    color: #0a0a0a;
  }
  .v4-ic svg { width: 20px; height: 20px; }
  .v4-ttl { display: flex; flex-direction: column; }
  .v4-ttl b { font-size: 24px; font-weight: 800; letter-spacing: -0.02em; }
  .v4-ttl span { font-size: 13px; font-weight: 600; color: #737373; margin-top: 2px; }
  .v4-desc { font-size: 14px; color: #525252; line-height: 1.45; }
  .v4-q {
    font-size: 12px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
  }
  .v4-arr {
    width: 36px; height: 36px; border-radius: 50%;
    background: #0a0a0a; color: #fafaf9;
    display: grid; place-items: center;
    transition: transform 0.2s;
  }
  .v4-row:hover .v4-arr { transform: translateX(4px); }

  /* ===== TWEAKS PANEL ===== */
  .tweaks {
    position: fixed; bottom: 20px; right: 20px;
    background: #1a1325; color: white;
    border-radius: 16px; padding: 16px;
    z-index: 100;
    display: none;
    min-width: 240px;
    box-shadow: 0 20px 40px -10px rgba(0,0,0,0.3);
    font-size: 13px;
  }
  .tweaks.open { display: block; }
  .tweaks h4 {
    margin: 0 0 12px; font-size: 11px; letter-spacing: 0.15em;
    text-transform: uppercase; color: #a78bfa; font-weight: 800;
  }
  .tw-opt {
    display: block; width: 100%;
    padding: 10px 12px; border-radius: 10px;
    background: transparent; color: white;
    text-align: left; margin-bottom: 4px;
    font-size: 13px; font-weight: 600;
    transition: background 0.15s;
  }
  .tw-opt:hover { background: rgba(255,255,255,0.08); }
  .tw-opt.active { background: #8b5cf6; }
  .tw-num {
    opacity: 0.5; font-variant-numeric: tabular-nums;
    font-size: 11px; margin-right: 8px;
  }
  .tw-opt.active .tw-num { opacity: 1; }
</style>
</head>
<body>
<div id="root"></div>

<script>
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "variation": 1
  }/*EDITMODE-END*/;
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="app.jsx"></script>
</body>
